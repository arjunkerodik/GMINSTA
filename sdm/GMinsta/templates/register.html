{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h1 class="form-title">GMinsta</h1>
    <p style="text-align: center; color: var(--text-secondary); font-weight: 600; font-size: 1rem; margin-bottom: 20px;">
        Sign up to see photos and videos from your friends.
    </p>
    
    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <input type="email" id="email" name="email" class="form-control" required placeholder="Mobile Number or Email">
        </div>

        <div class="form-group">
            <input type="text" id="name" name="name" class="form-control" required placeholder="Full Name">
        </div>
        
        <div class="form-group">
            <input type="password" id="password" name="password" class="form-control" required placeholder="Password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign Up</button>
    </form>
</div>

<div class="form-switch">
    Have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
</div>
{% endblock %}
