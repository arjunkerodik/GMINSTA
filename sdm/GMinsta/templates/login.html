{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h1 class="form-title">GMinsta</h1>
    
    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <input type="email" id="email" name="email" class="form-control" required placeholder="Phone number, username, or email">
        </div>
        
        <div class="form-group">
            <input type="password" id="password" name="password" class="form-control" required placeholder="Password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Log In</button>
    </form>
</div>

<div class="form-switch">
    Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a>
</div>
{% endblock %}
